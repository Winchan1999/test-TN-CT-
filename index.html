    // --- App Component ---
    function App() {
      const [questions, setQuestions] = useState([]);
      const [currentIdx, setCurrentIdx] = useState(0);
      const [answers, setAnswers] = useState({});
      const [isSubmitted, setIsSubmitted] = useState(false);
      const [timeLeft, setTimeLeft] = useState(30 * 60);
      const [appState, setAppState] = useState('start'); // start, playing, result, review

      useEffect(() => {
        // Chọn ngẫu nhiên 50 câu từ ngân hàng
        const selectedQuestions = [...rawQuestions].sort(() => 0.5 - Math.random()).slice(0, 50);

        const shuffled = selectedQuestions.map((q, index) => {
          let optionsWithIndex = q.options.map((opt, i) => ({ text: opt, isCorrect: i === 0 }));
          for (let i = optionsWithIndex.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [optionsWithIndex[i], optionsWithIndex[j]] = [optionsWithIndex[j], optionsWithIndex[i]];
          }
          return { id: index, question: q.q, options: optionsWithIndex };
        });
        setQuestions(shuffled);
      }, [appState === 'start']); // Reshuffle when going back to start

      useEffect(() => {
        let timer;
        if (appState === 'playing' && timeLeft > 0) {
          timer = setInterval(() => {
            setTimeLeft((prev) => {
              if (prev <= 1) { clearInterval(timer); handleSubmit(); return 0; }
              return prev - 1;
            });
          }, 1000);
        }
        return () => clearInterval(timer);
      }, [appState, timeLeft]);

      const formatTime = (seconds) => {
        const m = Math.floor(seconds / 60).toString().padStart(2, '0');
        const s = (seconds % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
      };

      const handleSelectOption = (questionId, optionIndex) => {
        if (appState !== 'playing') return;
        setAnswers(prev => ({ ...prev, [questionId]: optionIndex }));
      };

      const handleSubmit = () => {
        if (appState === 'playing') {
          const confirmSubmit = window.confirm("Bạn có chắc chắn muốn nộp bài?");
          if (confirmSubmit || timeLeft === 0) {
            setIsSubmitted(true);
            setAppState('result');
          }
        }
      };

      const calculateScore = () => {
        let correct = 0;
        questions.forEach((q) => {
          const selectedIdx = answers[q.id];
          if (selectedIdx !== undefined && q.options[selectedIdx].isCorrect) {
            correct++;
          }
        });
        return correct;
      };

      const restartQuiz = () => {
        setAnswers({});
        setIsSubmitted(false);
        setTimeLeft(30 * 60);
        setCurrentIdx(0);
        setAppState('start');
      };

      // Start Screen
      if (appState === 'start') {
        return (
          <div className="min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
            {/* Decorative background elements */}
            <div className="absolute top-[-10%] left-[-10%] w-96 h-96 bg-white/20 rounded-full blur-3xl animate-float"></div>
            <div className="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-white/10 rounded-full blur-3xl animate-float" style={{ animationDelay: '3s' }}></div>

            <div className="glass rounded-2xl md:rounded-3xl max-w-lg w-full p-6 md:p-10 text-center relative z-10 transform transition-all duration-500 hover:scale-[1.02]">
              <div className="w-24 h-24 bg-gradient-to-tr from-blue-500 to-purple-500 text-white rounded-2xl flex items-center justify-center mx-auto mb-8 shadow-lg rotate-3 hover:rotate-6 transition-transform">
                <Award size={48} />
              </div>
              <h1 className="text-3xl md:text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-slate-800 to-slate-600 mb-2 md:mb-4 tracking-tight">Thi Trắc Nghiệm CTĐ, CTCT</h1>
              <p className="text-slate-600 mb-6 md:mb-10 text-base md:text-lg font-medium">Bộ 50 câu hỏi test trắc nghiệm CTĐ, CTCT</p>

              <div className="glass-panel rounded-xl md:rounded-2xl p-4 md:p-6 mb-6 md:mb-10 text-left text-sm md:text-base text-slate-700 space-y-3 md:space-y-4 border border-white/50">
                <div className="flex items-center gap-3"><div className="w-2 h-2 rounded-full bg-blue-500"></div> <strong>Số lượng:</strong> 50 câu ngẫu nhiên từ bộ 250 câu.</div>
              </div>

              <button
                onClick={() => setAppState('playing')}
                className="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-4 px-8 rounded-2xl transition-all duration-300 shadow-[0_10px_20px_rgba(0,0,0,0.2)] hover:shadow-[0_15px_30px_rgba(0,0,0,0.3)] hover:-translate-y-1 flex items-center justify-center gap-3 text-lg"
              >
                <Play size={24} /> Bắt đầu test
              </button>
            </div>
          </div>
        );
      }

      // Result Screen
      if (appState === 'result') {
        const score = calculateScore();
        const isPassed = score >= 40;

        return (
          <div className="min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
            <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-full h-full bg-white/10 blur-3xl rounded-full"></div>

            <div className="glass rounded-2xl md:rounded-3xl max-w-md w-full p-6 md:p-10 text-center relative z-10 animate-scale-in mx-4">
              {isPassed ? (
                <div className="w-28 h-28 bg-gradient-to-br from-green-400 to-emerald-600 text-white rounded-full flex items-center justify-center mx-auto mb-8 shadow-[0_10px_30px_rgba(16,185,129,0.4)]">
                  <CheckCircle size={56} />
                </div>
              ) : (
                <div className="w-28 h-28 bg-gradient-to-br from-red-400 to-rose-600 text-white rounded-full flex items-center justify-center mx-auto mb-8 shadow-[0_10px_30px_rgba(225,29,72,0.4)]">
                  <XCircle size={56} />
                </div>
              )}

              <h1 className={`text-4xl font-black mb-2 ${isPassed ? 'text-emerald-600' : 'text-rose-600'} tracking-tight`}>
                {isPassed ? 'ĐẠT YÊU CẦU' : 'KHÔNG ĐẠT'}
              </h1>

              <div className="text-7xl font-black text-slate-800 my-8 drop-shadow-sm">
                {score}<span className="text-3xl text-slate-400 font-bold">/50</span>
              </div>

              <div className="flex flex-col sm:flex-row gap-3 md:gap-4 mt-6 md:mt-10">
                <button
                  onClick={() => { setAppState('review'); setCurrentIdx(0); }}
                  className="flex-1 bg-white/50 hover:bg-white/80 text-slate-800 font-bold py-4 px-4 rounded-2xl transition-all duration-300 shadow-sm hover:shadow-md border border-white/50"
                >
                  Xem lại bài
                </button>
                <button
                  onClick={restartQuiz}
                  className="flex-1 bg-slate-800 hover:bg-slate-900 text-white font-bold py-4 px-4 rounded-2xl transition-all duration-300 shadow-lg hover:shadow-xl hover:-translate-y-1 flex items-center justify-center gap-2"
                >
                  <RefreshCcw size={20} /> Test lại
                </button>
              </div>
            </div>
          </div>
        );
      }

      const currentQ = questions[currentIdx];

      // Playing & Review Screen
      return (
        <div className="h-[100dvh] md:h-screen w-full flex flex-col md:flex-row p-2 sm:p-4 md:p-6 gap-3 md:gap-6 box-border overflow-hidden">

          {/* LEFT PANEL */}
          <div className="flex-1 flex flex-col min-h-0 md:h-full overflow-hidden glass rounded-2xl md:rounded-3xl relative z-10">
            {/* Header */}
            <header className="border-b border-slate-200/50 px-4 md:px-8 py-3 md:py-5 flex justify-between items-center bg-white/40">
              <div>
                <h1 className="text-lg md:text-xl font-extrabold text-slate-800 tracking-tight">TEST TRẮC NGHIỆM CTĐ, CTCT</h1>
                <span className="text-xs md:text-sm font-medium text-slate-500 uppercase tracking-wider hidden sm:inline-block">{appState === 'review' ? 'Chế độ xem lại' : 'Đang làm bài'}</span>
              </div>

              <div className={`flex items-center gap-2 md:gap-3 px-3 md:px-5 py-1.5 md:py-2.5 rounded-xl md:rounded-2xl font-bold text-base md:text-lg shadow-sm transition-colors ${timeLeft < 300 ? 'bg-red-500 text-white animate-pulse' : 'bg-white/80 text-slate-800'}`}>
                <Clock size={22} />
                <span className="font-mono tracking-wide">{formatTime(timeLeft)}</span>
              </div>

              <button
                onClick={handleSubmit}
                disabled={appState === 'review'}
                className={`px-4 md:px-6 py-2 md:py-2.5 rounded-lg md:rounded-xl text-sm md:text-base font-bold transition-all duration-300 ${appState === 'review' ? 'bg-slate-200 text-slate-400 opacity-50 cursor-not-allowed' : 'bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white shadow-lg hover:shadow-xl hover:-translate-y-0.5'}`}
              >
                Nộp bài
              </button>
            </header>

            {/* Question Area */}
            <main className="flex-1 overflow-y-auto p-4 md:p-10 flex flex-col">
              <div className="max-w-4xl mx-auto w-full flex flex-col flex-1">
                <div className="mb-8">
                  <div className="inline-flex items-center gap-2 bg-blue-100/50 text-blue-700 font-bold px-4 py-1.5 rounded-full text-sm mb-4">
                    <div className="w-2 h-2 rounded-full bg-blue-500"></div>
                    Câu hỏi {currentIdx + 1}
                  </div>
                  <h2 className="text-xl md:text-3xl font-bold text-slate-800 leading-tight">
                    {currentQ?.question}
                  </h2>
                </div>

                <div className="space-y-4 mt-2 flex-1">
                  {currentQ?.options.map((opt, i) => {
                    const isSelected = answers[currentQ.id] === i;
                    let bgClass = "bg-white/60 hover:bg-white/90 border-slate-200 shadow-sm hover:shadow-md";
                    let textClass = "text-slate-700";
                    let dotClass = "border-slate-300 bg-transparent";

                    if (appState === 'playing') {
                      if (isSelected) {
                        bgClass = "bg-blue-50/80 border-blue-400 shadow-md transform scale-[1.01]";
                        textClass = "text-blue-800 font-semibold";
                        dotClass = "border-blue-500 bg-blue-500";
                      }
                    } else if (appState === 'review') {
                      if (opt.isCorrect) {
                        bgClass = "bg-green-50 border-green-400 shadow-md";
                        textClass = "text-green-800 font-bold";
                        dotClass = "border-green-500 bg-green-500";
                      } else if (isSelected && !opt.isCorrect) {
                        bgClass = "bg-red-50 border-red-400";
                        textClass = "text-red-800 font-semibold";
                        dotClass = "border-red-500 bg-red-500";
                      } else {
                        bgClass = "bg-white/40 border-slate-200 opacity-60";
                      }
                    }

                    return (
                      <button
                        key={i}
                        onClick={() => handleSelectOption(currentQ.id, i)}
                        disabled={appState === 'review'}
                        className={`w-full text-left p-5 rounded-2xl border transition-all duration-300 flex items-start gap-5 ${bgClass}`}
                      >
                        <div className={`shrink-0 w-7 h-7 rounded-full border-2 flex items-center justify-center mt-0.5 transition-colors ${dotClass}`}>
                          {(appState === 'playing' && isSelected) && <div className="w-2.5 h-2.5 bg-white rounded-full"></div>}
                          {(appState === 'review' && opt.isCorrect) && <CheckCircle size={16} className="text-white" />}
                          {(appState === 'review' && isSelected && !opt.isCorrect) && <XCircle size={16} className="text-white" />}
                        </div>
                        <span className={`text-lg leading-relaxed ${textClass}`}>
                          {opt.text}
                        </span>
                      </button>
                    )
                  })}
                </div>

                {/* Bottom Nav */}
                <div className="flex justify-between items-center mt-10 pt-8 border-t border-slate-200/50">
                  <button
                    onClick={() => setCurrentIdx(prev => Math.max(0, prev - 1))}
                    disabled={currentIdx === 0}
                    className="flex items-center gap-1 md:gap-2 px-4 md:px-6 py-2 md:py-3 rounded-xl md:rounded-2xl text-slate-700 text-sm md:text-base font-bold hover:bg-white/80 disabled:opacity-40 transition-all shadow-sm hover:shadow"
                  >
                    <ChevronLeft size={20} /> Trước
                  </button>

                  {appState === 'review' && (
                    <button
                      onClick={() => setAppState('result')}
                      className="text-blue-600 hover:text-blue-700 hover:underline font-bold"
                    >
                      Về trang kết quả
                    </button>
                  )}

                  <button
                    onClick={() => setCurrentIdx(prev => Math.min(questions.length - 1, prev + 1))}
                    disabled={currentIdx === questions.length - 1}
                    className="flex items-center gap-1 md:gap-2 px-4 md:px-6 py-2 md:py-3 rounded-xl md:rounded-2xl bg-slate-800 text-white text-sm md:text-base font-bold hover:bg-slate-900 disabled:opacity-40 transition-all shadow-md hover:shadow-lg hover:-translate-y-0.5"
                  >
                    Tiếp <ChevronRight size={20} />
                  </button>
                </div>
              </div>
            </main>
          </div>

          {/* RIGHT PANEL: Navigator Grid */}
          <div className="w-full md:w-96 flex flex-col h-56 md:h-full shrink-0 glass rounded-2xl md:rounded-3xl relative z-10 overflow-hidden">
            <div className="p-6 border-b border-slate-200/50 bg-white/40 flex justify-between items-center shrink-0">
              <h3 className="font-extrabold text-slate-800 text-lg">Danh sách câu hỏi</h3>
              <span className="text-sm bg-slate-800 text-white px-3 py-1.5 rounded-xl font-bold shadow-sm">
                {Object.keys(answers).length}/50
              </span>
            </div>

            <div className="flex-1 overflow-y-auto p-6 scroll-smooth">
              <div className="grid grid-cols-5 gap-3">
                {questions.map((q, idx) => {
                  const isAnswered = answers[q.id] !== undefined;
                  const isCurrent = currentIdx === idx;

                  let boxClass = "bg-white/80 border-slate-200 text-slate-600 hover:bg-white font-medium shadow-sm hover:shadow";

                  if (appState === 'playing') {
                    if (isAnswered) boxClass = "bg-blue-100 border-blue-300 text-blue-700 font-bold shadow-inner";
                    if (isCurrent) boxClass += " ring-4 ring-blue-400 ring-offset-2 ring-offset-transparent transform scale-110";
                  } else if (appState === 'review') {
                    const isCorrect = isAnswered && q.options[answers[q.id]].isCorrect;
                    if (!isAnswered) boxClass = "bg-white/40 border-slate-200 text-slate-400";
                    else if (isCorrect) boxClass = "bg-green-100 border-green-400 text-green-700 font-bold";
                    else boxClass = "bg-red-100 border-red-400 text-red-700 font-bold";

                    if (isCurrent) boxClass += " ring-4 ring-slate-800 ring-offset-2 transform scale-110";
                  }

                  return (
                    <button
                      key={q.id}
                      onClick={() => setCurrentIdx(idx)}
                      className={`h-12 w-full rounded-xl border flex items-center justify-center text-sm transition-all duration-200 ${boxClass}`}
                    >
                      {idx + 1}
                    </button>
                  );
                })}
              </div>
            </div>

            {appState === 'review' && (
              <div className="p-6 bg-white/40 border-t border-slate-200/50 text-sm font-medium text-slate-700 space-y-3 shrink-0">
                <div className="flex items-center gap-3"><div className="w-5 h-5 bg-green-100 border-2 border-green-400 rounded-md shadow-sm"></div> Trả lời đúng</div>
                <div className="flex items-center gap-3"><div className="w-5 h-5 bg-red-100 border-2 border-red-400 rounded-md shadow-sm"></div> Trả lời sai</div>
                <div className="flex items-center gap-3"><div className="w-5 h-5 bg-white/50 border-2 border-slate-300 rounded-md shadow-sm"></div> Bỏ qua</div>
              </div>
            )}
          </div>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
